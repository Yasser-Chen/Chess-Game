<!DOCTYPE html>
<html lang="en" translate="no">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chess Game</title>
    <link rel="icon" type="image/x-icon" href="static/favicon.ico" />
    <link rel="stylesheet" href="static/bootstrap/bootstrap.css" />
    <link rel="stylesheet" href="static/bs-toggle/bootstrap4-toggle.min.css" />
    <link rel="stylesheet" href="static/fonts.googleapis.com.css?family=Source+Sans+Pro:300,400,400i,700&display=fallback" />
    <link rel="stylesheet" href="static/fontawesome/font-awesome.css" />
    <link rel="stylesheet" href="static/style.css" />
  </head>
  <body style="overflow-x: hidden; overflow-y: auto;" oncontextmenu="return false;">
    <div id="game" class="role-black">
      <div class="zoom-control-hover-zone" aria-hidden="true"></div>
      <div class="resize-visibility-toggle-shell" aria-hidden="false">
        <button
          id="resizeToggleBtn"
          type="button"
          class="resize-visibility-toggle"
          title="Hide resize buttons"
          aria-label="Hide resize buttons"
        >
          <i id="resizeToggleIcon" class="fas fa-eye"></i>
        </button>
      </div>
      <div class="board-zoom-controls" aria-label="Board zoom controls">
        <button
          id="perfectZoomBtn"
          type="button"
          class="board-zoom-button board-zoom-button-wide"
          title="Fit board to screen"
          aria-label="Fit board to screen"
        >
          Fit
        </button>
        <button
          id="zoomOutBtn"
          type="button"
          class="board-zoom-button"
          title="Zoom out"
          aria-label="Zoom out"
        >
          −
        </button>
        <button
          id="zoomInBtn"
          type="button"
          class="board-zoom-button"
          title="Zoom in"
          aria-label="Zoom in"
        >
          +
        </button>
        <button
          id="fullscreenBtn"
          type="button"
          class="board-zoom-button"
          title="Enter fullscreen"
          aria-label="Enter fullscreen"
        >
          ⛶
        </button>
      </div>
      <div id="boardArea">
        <div id="evaluationBar" aria-label="Stockfish evaluation bar">
          <div id="evaluationBlackFill"></div>
          <div id="evaluationWhiteFill"></div>
          <div id="evaluationScore">0.00</div>
        </div>
        <table class="board" id="board">
          <tbody>
            <tr>
              <td class="square white cords cords-8"></td>
              <td class="square black"></td>
              <td class="square white"></td>
              <td class="square black"></td>
              <td class="square white"></td>
              <td class="square black"></td>
              <td class="square white"></td>
              <td class="square black"></td>
            </tr>
            <tr>
              <td class="square black cords cords-7"></td>
              <td class="square white"></td>
              <td class="square black"></td>
              <td class="square white"></td>
              <td class="square black"></td>
              <td class="square white"></td>
              <td class="square black"></td>
              <td class="square white"></td>
            </tr>
            <tr>
              <td class="square white cords cords-6"></td>
              <td class="square black"></td>
              <td class="square white"></td>
              <td class="square black"></td>
              <td class="square white"></td>
              <td class="square black"></td>
              <td class="square white"></td>
              <td class="square black"></td>
            </tr>
            <tr>
              <td class="square black cords cords-5"></td>
              <td class="square white"></td>
              <td class="square black"></td>
              <td class="square white"></td>
              <td class="square black"></td>
              <td class="square white"></td>
              <td class="square black"></td>
              <td class="square white"></td>
            </tr>
            <tr>
              <td class="square white cords cords-4"></td>
              <td class="square black"></td>
              <td class="square white"></td>
              <td class="square black"></td>
              <td class="square white"></td>
              <td class="square black"></td>
              <td class="square white"></td>
              <td class="square black"></td>
            </tr>
            <tr>
              <td class="square black cords cords-3"></td>
              <td class="square white"></td>
              <td class="square black"></td>
              <td class="square white"></td>
              <td class="square black"></td>
              <td class="square white"></td>
              <td class="square black"></td>
              <td class="square white"></td>
            </tr>
            <tr>
              <td class="square white cords cords-2"></td>
              <td class="square black"></td>
              <td class="square white"></td>
              <td class="square black"></td>
              <td class="square white"></td>
              <td class="square black"></td>
              <td class="square white"></td>
              <td class="square black"></td>
            </tr>
            <tr>
              <td class="square black cords cords-1 cords-a"></td>
              <td class="square white cords cords-b"></td>
              <td class="square black cords cords-c"></td>
              <td class="square white cords cords-d"></td>
              <td class="square black cords cords-e"></td>
              <td class="square white cords cords-f"></td>
              <td class="square black cords cords-g"></td>
              <td class="square white cords cords-h"></td>
            </tr>
          </tbody>
        </table>
      </div>

      <div id="spacer">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;</div>
      <div id="sidePanelHolder">
        <div id="timerHolder">
          <div class="clock-block clock-block-black">
            <div id="capturedPiecesTop" class="captured-pieces-panel captured-pieces-top" aria-label="Top side captured pieces">
              <div class="captured-pieces-icons"></div>
              <div class="captured-pieces-score"></div>
            </div>
            <div id="BlackGameActions" class="clock-game-actions" data-action-color="black"></div>
            <div id="BlackTimer">05:00</div>
          </div>
          <div id="sideGameAnalysisPanel" class="game-recap-panel side-game-analysis-panel no-result-hub-toggle" aria-label="Post-game analysis" style="display:none;">
            <div class="game-recap-actions" aria-label="Game result actions">
              <button id="sideRestartGameBtn" type="button" class="game-recap-action game-recap-action-primary">Restart</button>
              <button id="sideExitGameBtn" type="button" class="game-recap-action game-recap-action-secondary">Exit</button>
            </div>
            <div class="game-recap-title">Evaluation drift</div>
            <div id="sideEvaluationDriftGraph"></div>
            <div class="game-recap-title">Game recap</div>
            <div id="sideGameMoveRecapList" class="game-move-recap-list"></div>
          </div>
          <div class="clock-block clock-block-white">
            <div id="WhiteTimer">05:00</div>
            <div id="WhiteGameActions" class="clock-game-actions" data-action-color="white"></div>
            <div id="capturedPiecesBottom" class="captured-pieces-panel captured-pieces-bottom" aria-label="Bottom side captured pieces">
              <div class="captured-pieces-icons"></div>
              <div class="captured-pieces-score"></div>
            </div>
          </div>
        </div>
        <div id="historyNavigationControls" aria-label="Position history navigation">
          <button
            id="historyHomeBtn"
            type="button"
            class="history-nav-button"
            title="First position"
            aria-label="First position"
          >
            <i class="fas fa-step-backward"></i>
          </button>
          <button
            id="historyBackBtn"
            type="button"
            class="history-nav-button"
            title="Previous position"
            aria-label="Previous position"
          >
            <i class="fas fa-angle-left"></i>
          </button>
          <button
            id="historyForwardBtn"
            type="button"
            class="history-nav-button"
            title="Next position"
            aria-label="Next position"
          >
            <i class="fas fa-angle-right"></i>
          </button>
          <button
            id="historyEndBtn"
            type="button"
            class="history-nav-button"
            title="Latest position"
            aria-label="Latest position"
          >
            <i class="fas fa-step-forward"></i>
          </button>
        </div>
      </div>
      <div class="overlay">
        <div class="row card" id="loadding_pannnel" style="display: none">
          <div class="col-12">
            <h1 id="loading_chess_event" class="d-flex justify-content-center">
              Looking for a match
            </h1>

            <div class="matchmaking-spinner-row" aria-hidden="true">
              <div class="spinner-grow text-secondary" role="status">
                <span class="sr-only">Loading...</span>
              </div>
              <div class="spinner-grow text-secondary" role="status">
                <span class="sr-only">Loading...</span>
              </div>
              <div class="spinner-grow text-secondary" role="status">
                <span class="sr-only">Loading...</span>
              </div>
              <div class="spinner-grow text-secondary" role="status">
                <span class="sr-only">Loading...</span>
              </div>
            </div>
            <div class="matchmaking-actions">
              <button
                id="cancelMatchmakingBtn"
                type="button"
                class="btn btn-outline-secondary btn-sm matchmaking-cancel-btn"
                onclick="cancelOnlineMatchmaking()"
              >
                Cancel
              </button>
            </div>
          </div>
        </div>
        <div class="row card" id="main_pannnel">
          <div class="col-12" style="line-height: 10px !important">&nbsp;</div>

          <div class="col-12">
            <div class="d-flex justify-content-center">
              <div class="input-group">
                <input
                  id="playerTimeInput"
                  type="text"
                  value="300"
                  class="form-control"
                  placeholder="Example: 300 "
                />
                <div class="input-group-append">
                  <span class="input-group-text">Game time in seconds</span>
                </div>
              </div>
            </div>
          </div>
          <div class="col-12" style="line-height: 10px !important">&nbsp;</div>
          <div class="col-12">
            <div class="d-flex justify-content-center">
              <div class="input-group">
                <input
                  id="playerIncrementInput"
                  type="text"
                  value="0"
                  class="form-control"
                  placeholder="Example: 0 "
                />
                <div class="input-group-append">
                  <span class="input-group-text"
                    >Increment in seconds&nbsp;</span
                  >
                </div>
              </div>
            </div>
          </div>
          <div class="col-12" style="line-height: 10px !important">&nbsp;</div>
          <div class="col-12">
            <div class="d-flex justify-content-center">
              <div class="btn-group btn-group-toggle" data-toggle="buttons">
                <label class="btn btn-outline-success disabled" aria-disabled="true" title="Online mode requires the Django/WebSocket backend">
                  <input
                    type="radio"
                    name="mode_of_play"
                    value="online"
                    disabled
                  />
                  <span class="small">
                    PLay Online <i class="fas fa-globe-africa menu-mode-icon"></i>
                  </span>
                </label>
                <label class="btn btn-outline-dark active">
                  <input type="radio" name="mode_of_play" value="offline" checked />
                  <span class="small">
                    PLay Offline <i class="fas fa-user-friends menu-mode-icon"></i
                  ></span>
                </label>
                <label class="btn btn-outline-secondary">
                  <input type="radio" name="mode_of_play" value="vs_bot" />
                  <span class="small">
                    PLay vs Bot <i class="fas fa-robot menu-mode-icon"></i
                  ></span>
                </label>
              </div>
            </div>
          </div>

          <div class="col-12" style="line-height: 10px !important">&nbsp;</div>

          <div class="col-12">
            <div class="d-flex justify-content-center">
              <div
                id="playerColorOptions"
                class="btn-group btn-group-toggle"
                data-toggle="buttons"
                aria-label="Choose your color"
              >
                <label class="btn btn-outline-secondary" title="White" aria-label="White">
                  <input type="radio" name="player_color" value="white" aria-label="White" />
                  <i class="fas fa-chess-king menu-color-icon menu-color-white" aria-hidden="true"></i>
                  <span class="sr-only">White</span>
                </label>
                <label class="btn btn-outline-secondary active" title="Random" aria-label="Random">
                  <input type="radio" name="player_color" value="random" aria-label="Random" checked />
                  <span class="menu-color-icon menu-color-random" aria-hidden="true"></span>
                  <span class="sr-only">Random</span>
                </label>
                <label class="btn btn-outline-secondary" title="Black" aria-label="Black">
                  <input type="radio" name="player_color" value="black" aria-label="Black" />
                  <i class="fas fa-chess-king menu-color-icon menu-color-black" aria-hidden="true"></i>
                  <span class="sr-only">Black</span>
                </label>
              </div>
            </div>
          </div>

          <div class="col-12" style="line-height: 10px !important">&nbsp;</div>

          <div class="col-12" id="botOptionsPanel" style="display: none">
            <div class="d-flex justify-content-center">
              <div class="input-group">
                <select id="botTypeSelect" class="form-control" aria-label="Choose bot strength">
                  <option value="weak" selected>Weak Bot</option>
                  <option value="stockfish">Super Strong Bot (Stockfish)</option>
                </select>
                <div class="input-group-append">
                  <span class="input-group-text">Bot strength</span>
                </div>
              </div>
            </div>
          </div>

          <div class="col-12" style="line-height: 10px !important">&nbsp;</div>

          <div class="col-12">
            <div class="d-flex justify-content-center">
              <button onclick="initGame()" class="btn btn-dark btn-block">
                Start
              </button>
            </div>
          </div>
          <div class="col-12" style="line-height: 10px !important">&nbsp;</div>
        </div>
      </div>
    </div>

    <script>
      window.STATIC_EXPORT = true;
    </script>

    <script src="static/jquery/jquery.js"></script>
    <script src="static/bs-toggle/bootstrap4-toggle.min.js"></script>
    <script src="static/bootstrap/popover.js"></script>
    <script src="static/bootstrap/bootstrap.js"></script>
    <script src="static/jquery/jquery-ui.js"></script>

    <!-- Clock synchronization module (must load before menu.js) -->
    <script src="static/classes/clock_sync.js"></script>

    <!-- Chess game files -->
    <script src="static/classes/utils.js"></script>
    <script src="static/classes/menu.js"></script>
    <script src="static/classes/board.js"></script>
    <script src="static/classes/stockfish-service.js"></script>
    <script src="static/classes/action/bot.js"></script>
    <script src="static/classes/action/move.js"></script>
    <script src="static/classes/pieces/piece.js"></script>
    <script src="static/classes/pieces/pawn.js"></script>
    <script src="static/classes/pieces/king.js"></script>
    <script src="static/classes/pieces/bishop.js"></script>
    <script src="static/classes/pieces/knight.js"></script>
    <script src="static/classes/pieces/rook.js"></script>
    <script src="static/classes/pieces/queen.js"></script>
  </body>
</html>
